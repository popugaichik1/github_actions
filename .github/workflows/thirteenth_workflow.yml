name: Thirteenth Workflow
on: push


jobs: 
    # failure() - ф-ция, определяющая что шаг неудачный .succes() - ф-ция, определяющая что шаг удачный. always() - ф-ция, которая возвращает true при любом расскладе, canceled() - ф-ция, которая возвращает true в том случае если мы завершили джоб нажатием на кнопку например.
    job:
        runs-on: ubuntu-latest
        steps:
            
            - name: Runs on Canceled
              #возвращает run, если предидущие шаги были отменены
              if: ${{ cancelled() }}
              run: echo "Runs on Canceled"
            
            - name: Runs on any case
              if: ${{ always() }}
              run: echo "Runs on any case"

            - name: Runs on Success case
              if: ${{ success() }}
              run: echo "Runs on Success case"

            - name: Runs on Failure Case
              if: ${{ failure() }}
              run: echo "Runs on Failure case"

    second-job:
        runs-on: ubuntu-latest
        needs: job 
        if: ${{ failure() }}
        steps:
            - run: echo "Job was failed"

